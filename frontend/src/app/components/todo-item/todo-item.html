<div class="todo-card" [class.completed]="todo().completed">
  <div class="todo-left">
    <button class="checkbox" [class.checked]="todo().completed" (click)="onToggle()">
      @if (todo().completed) {
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      }
    </button>
    <div class="todo-content">
      <h3 class="todo-title">{{ todo().title }}</h3>
      @if (todo().description) {
        <p class="todo-desc">{{ todo().description }}</p>
      }
      <div class="todo-meta">
        <span class="priority-badge" [class]="todo().priority.toLowerCase()">
          {{ getPriorityLabel(todo().priority) }}
        </span>
        <span class="todo-date">{{ todo().createdAt | date:'MMM d, y' }}</span>
      </div>
    </div>
  </div>

  <div class="todo-actions">
    <button class="action-btn edit-btn" (click)="onEdit()" title="Sửa">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
    <button class="action-btn delete-btn" (click)="onDelete()" title="Xóa">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="3 6 5 6 21 6"/>
        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
      </svg>
    </button>
  </div>
</div>
